services:
  - type: web
    name: multicloud-manager
    env: go
    plan: free
    buildCommand: go build -o app .
    startCommand: ./app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multicloud-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: multicloud-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production

databases:
  - name: multicloud-db
    databaseName: multicloud
    user: multicloud_user
    plan: free

redis:
  - name: multicloud-redis
    plan: free
    maxmemoryPolicy: noeviction
