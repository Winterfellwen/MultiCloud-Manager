services:
  - type: web
    name: multicloud-backend
    env: go
    plan: free
    buildCommand: go build -o app .
    startCommand: (which az >/dev/null 2>&1 || { which pip3 >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y -qq python3-pip; }; pip3 install azure-cli; }) && ./app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multicloud-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: multicloud-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: multicloud-db
    databaseName: multicloud
    user: multicloud_user
    plan: free

redis:
  - name: multicloud-redis
    plan: free
    maxmemoryPolicy: noeviction
