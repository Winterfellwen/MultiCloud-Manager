services:
  - type: web
    name: multicloud-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    rootDir: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multicloud-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: multicloud-db
    databaseName: multicloud
    user: multicloud_user
    plan: free
