# Ingress：对外暴露 HTTP(S) 服务
# 需要集群有 Ingress Controller（如 nginx-ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudops-ingress
  namespace: cloudops
  annotations:
    # 使用 nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    # WebSocket 升级头（对 /ws 路径
    nginx.ingress.kubernetes.io/websocket-services: "cloudops-app"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upgrade: "$http_upgrade"
    nginx.ingress.kubernetes.io/connection-proxy-header: "upgrade"
    # 可选：启用 cert-manager 自动签发 TLS 证书
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:
  #   - hosts:
  #       - cloudops.example.com
  #     secretName: cloudops-tls
  rules:
    - host: cloudops.example.com  # 替换为你的域名
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudops-app
                port:
                  number: 80
