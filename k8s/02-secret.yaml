apiVersion: v1
kind: Secret
metadata:
  name: cloudops-secrets
  namespace: cloudops
type: Opaque
stringData:
  # ============ 必选：JWT ============
  # 建议：kubectl create secret generic cloudops-secrets --from-literal=JWT_SECRET=your-very-long-random-string
  JWT_SECRET: "change-me-please-use-a-random-long-string-here"

  # ============ 可选：管理员密码（留空时首次启动随机生成 ============
  ADMIN_PASSWORD: ""

  # ============ 可选：云服务商凭据 ============
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"

  ALIYUN_ACCESS_KEY_ID: ""
  ALIYUN_ACCESS_KEY_SECRET: ""

  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""

  RENDER_API_KEY: ""

  # ============ 可选：LLM API Key ============
  LLM_API_KEY: ""
