<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 云助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; font-weight: 500; color: #333; }
        .container { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #e0e0e0; }
        .new-chat-btn { width: 100%; padding: 10px 16px; background: #0066ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .new-chat-btn:hover { background: #0052cc; }
        .sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
        .session-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
        .session-item:hover { background: #f0f0f0; }
        .session-item.active { background: #e6f0ff; }
        .session-title { font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-time { font-size: 12px; color: #999; margin-top: 4px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 16px; display: flex; gap: 12px; }
        .message.user { flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; }
        .message.user .message-avatar { background: #0066ff; color: #fff; }
        .message.assistant .message-avatar { background: #f0f0f0; color: #333; }
        .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .message.user .message-content { background: #0066ff; color: #fff; }
        .message.assistant .message-content { background: #fff; border: 1px solid #e0e0e0; }
        .input-area { padding: 16px 20px; background: #fff; border-top: 1px solid #e0e0e0; }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .input-wrapper textarea { flex: 1; padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; resize: none; font-size: 14px; font-family: inherit; min-height: 44px; max-height: 120px; }
        .input-wrapper textarea:focus { outline: none; border-color: #0066ff; }
        .send-btn { padding: 12px 20px; background: #0066ff; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .send-btn:hover { background: #0052cc; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; }
        .empty-state h2 { font-size: 24px; margin-bottom: 8px; color: #666; }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createSession()">+ 新建对话</button>
            </div>
            <div class="sessions-list" id="sessionsList"></div>
        </div>
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-state" id="emptyState">
                    <h2>AI 云助手</h2>
                    <p>选择或创建一个对话开始</p>
                </div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/ai';
        let currentSessionId = null;
        let sessions = [];

        async function loadSessions() {
            try {
                const resp = await fetch(`${API_BASE}/session`);
                const data = await resp.json();
                sessions = data.data || [];
                renderSessions();
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        function renderSessions() {
            const list = document.getElementById('sessionsList');
            list.innerHTML = sessions.map(s => `
                <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="selectSession('${s.id}')">
                    <div class="session-title">${s.title || 'New Session'}</div>
                    <div class="session-time">${new Date(s.time.created).toLocaleString()}</div>
                </div>
            `).join('');
        }

        async function createSession() {
            try {
                const resp = await fetch(`${API_BASE}/session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ directory: '.' })
                });
                const data = await resp.json();
                currentSessionId = data.data.id;
                sessions.unshift(data.data);
                renderSessions();
                showChat();
            } catch (e) {
                console.error('Failed to create session:', e);
            }
        }

        function selectSession(id) {
            currentSessionId = id;
            renderSessions();
            loadMessages(id);
            showChat();
        }

        function showChat() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('inputArea').style.display = 'block';
        }

        async function loadMessages(sessionId) {
            try {
                const resp = await fetch(`${API_BASE}/session/${sessionId}/message`);
                const data = await resp.json();
                renderMessages(data.data || []);
            } catch (e) {
                console.error('Failed to load messages:', e);
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages');
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state"><h2>开始对话</h2><p>输入消息开始与 AI 助手交流</p></div>';
                return;
            }
            container.innerHTML = messages.reverse().map(m => {
                if (m.type === 'user') {
                    const text = typeof m.data === 'string' ? m.data : (m.data?.text || '');
                    return `<div class="message user">
                        <div class="message-avatar">U</div>
                        <div class="message-content">${escapeHtml(text)}</div>
                    </div>`;
                }
                if (m.type === 'assistant') {
                    const content = m.data?.content || [];
                    const text = content.filter(c => c.type === 'text').map(c => c.text).join('');
                    return `<div class="message assistant">
                        <div class="message-avatar">AI</div>
                        <div class="message-content">${escapeHtml(text)}</div>
                    </div>`;
                }
                return '';
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentSessionId) return;

            input.value = '';
            input.style.height = 'auto';

            const container = document.getElementById('messages');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.style.display = 'none';

            container.innerHTML += `<div class="message user">
                <div class="message-avatar">U</div>
                <div class="message-content">${escapeHtml(text)}</div>
            </div>`;

            container.innerHTML += `<div class="message assistant" id="streamingMessage">
                <div class="message-avatar">AI</div>
                <div class="message-content"><em>思考中...</em></div>
            </div>`;
            container.scrollTop = container.scrollHeight;

            document.getElementById('sendBtn').disabled = true;

            try {
                const resp = await fetch(`${API_BASE}/session/${currentSessionId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: { text } })
                });

                if (resp.ok) {
                    await loadMessages(currentSessionId);
                    await loadSessions();
                } else {
                    const err = await resp.json();
                    document.getElementById('streamingMessage').querySelector('.message-content').innerHTML = 
                        `<span style="color:red">Error: ${escapeHtml(err.message || 'Unknown error')}</span>`;
                }
            } catch (e) {
                document.getElementById('streamingMessage').querySelector('.message-content').innerHTML = 
                    `<span style="color:red">Network error: ${e.message}</span>`;
            }

            document.getElementById('sendBtn').disabled = false;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Load sessions on init
        loadSessions();
    </script>
</body>
</html>
