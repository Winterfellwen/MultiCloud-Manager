<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MultiCloud Manager - 登录</title>
<style>
:root {
  --primary: #6366f1;
  --primary-hover: #818cf8;
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --text-secondary: #8b8fa3;
  --radius-sm: 8px;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
}
html.light {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --border: #e4e7ed;
  --text: #1a1a2e;
  --text-secondary: #666666;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

.login-container { width: 100%; max-width: 400px; padding: 20px; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 32px; box-shadow: var(--shadow-lg); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo h1 { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.login-logo p { font-size: 14px; color: var(--text-secondary); }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
.form-group input:focus { border-color: var(--primary); }
.form-group input::placeholder { color: var(--text-secondary); }

.login-btn { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: 8px; }
.login-btn:hover { background: var(--primary-hover); }
.login-btn:disabled { opacity: .6; cursor: not-allowed; }

.login-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: #ef4444; display: none; }
.login-error.show { display: block; }

.login-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <h1>☁️ MultiCloud</h1>
      <p>统一多云资源管理平台</p>
    </div>
    
    <div class="login-error" id="errorMsg"></div>
    
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">登 录</button>
    </form>
    
    <div class="login-footer">
      <p>统一多云资源管理平台</p>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';

// 检查是否已登录
(function checkAuth() {
  const token = localStorage.getItem('token');
  if (token) {
    // 验证token是否有效
    fetch(API_BASE + '/auth/profile', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(res => {
      if (res.ok) window.location.href = '/';
    })
    .catch(() => {});
  }
})();

// 应用主题
(function applyTheme() {
  const theme = localStorage.getItem('theme') || 'dark';
  if (theme === 'light') document.documentElement.classList.add('light');
})();

async function handleLogin(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');
  
  if (!username || !password) {
    errorMsg.textContent = '请输入用户名和密码';
    errorMsg.classList.add('show');
    return false;
  }
  
  loginBtn.disabled = true;
  loginBtn.textContent = '登录中...';
  errorMsg.classList.remove('show');
  
  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    
    if (!res.ok) {
      throw new Error(data.error || '登录失败');
    }
    
    // 保存token和用户信息
    localStorage.setItem('token', data.token);
    localStorage.setItem('userInfo', JSON.stringify(data.user));
    
    // 跳转到首页
    window.location.href = '/';
    
  } catch (err) {
    errorMsg.textContent = err.message || '登录失败，请检查用户名和密码';
    errorMsg.classList.add('show');
    loginBtn.disabled = false;
    loginBtn.textContent = '登 录';
  }
  
  return false;
}

// 回车提交
document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin(e);
});
</script>
</body>
</html>
