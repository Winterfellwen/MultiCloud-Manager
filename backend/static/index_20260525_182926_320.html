<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MultiCloud Manager</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --text-secondary: #8b8fa3;
  --primary: #6366f1;
  --primary-hover: #818cf8;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --azure: #0078d4;
  --tencent: #00a4ff;
  --oracle: #f80000;
  --render: #46e3b7;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
header h1 { font-size: 15px; font-weight: 600; }
header .status { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
nav button { flex: 1; padding: 12px; border: none; background: none; color: var(--text-secondary); font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
nav button.active { color: var(--primary); border-bottom-color: var(--primary); }
main { flex: 1; overflow-y: auto; padding: 16px; display: none; }
main.active { display: block; }

/* Chat */
.chat-messages { display: flex; flex-direction: column; gap: 12px; padding-bottom: 8px; }
.chat-msg { max-width: 85%; padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.5; word-break: break-word; }
.chat-msg.user { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
.chat-msg.agent { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; white-space: pre-line; }
.chat-input-bar { display: flex; gap: 8px; padding: 10px 14px; background: var(--surface); border-top: 1px solid var(--border); }
.chat-input-bar input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 24px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
.chat-input-bar input:focus { border-color: var(--primary); }
.chat-input-bar button { padding: 10px 18px; border: none; border-radius: 24px; background: var(--primary); color: #fff; font-size: 14px; cursor: pointer; }
.chat-input-bar button:disabled { opacity: .5; }
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.quick-actions button { padding: 6px 14px; border: 1px solid var(--border); border-radius: 16px; background: var(--surface); color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all .2s; }
.quick-actions button:hover { border-color: var(--primary); color: var(--primary); }

/* Accounts */
.section-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; padding: 0 4px; }
.account-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.account-card .icon { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }
.icon-azure { background: var(--azure); }
.icon-tencent { background: var(--tencent); }
.icon-oracle { background: var(--oracle); }
.icon-render { background: var(--render); }
.account-card .info { flex: 1; min-width:0; }
.account-card .name { font-size: 14px; font-weight: 600; }
.account-card .meta { font-size: 11px; color: var(--text-secondary); }
.account-card .actions { flex-shrink: 0; }
.account-card .actions button { padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: none; color: var(--text-secondary); font-size: 11px; cursor: pointer; }
.account-card .actions button:hover { border-color: var(--danger); color: var(--danger); }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; }
.empty .icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

/* Add Account - cloud selector */
.cloud-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.cloud-option { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 10px; text-align: center; cursor: pointer; transition: all .2s; }
.cloud-option:hover, .cloud-option.selected { border-color: var(--primary); background: #6366f11a; }
.cloud-option .logo { font-size: 24px; margin-bottom: 4px; }
.cloud-option .label { font-size: 11px; color: var(--text-secondary); }

/* Form */
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.form-group label .required { color: var(--danger); }
.form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
.form-group input:focus { border-color: var(--primary); }
.form-group .hint { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.form-group .hint a { color: var(--primary); text-decoration: none; }
.form-actions { display: flex; gap: 8px; }
.form-actions button { flex: 1; padding: 10px; border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; }
.form-actions .cancel { background: var(--border); color: var(--text); }
.form-actions .submit { background: var(--primary); color: #fff; }

/* Resources */
.resource-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.resource-card .info { flex: 1; }
.resource-card .name { font-size: 14px; font-weight: 600; }
.resource-card .type { font-size: 12px; color: var(--text-secondary); }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.status-running { background: var(--success); }
.status-stopped { background: var(--text-secondary); }
.resource-actions button { padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: none; color: var(--text); font-size: 12px; cursor: pointer; margin-left: 4px; }
.resource-actions button:hover { border-color: var(--primary); color: var(--primary); }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="status" id="statusDot"></span>
  <h1>MultiCloud Manager</h1>
</header>

<nav>
  <button class="active" data-tab="chat">对话</button>
  <button data-tab="accounts">账户</button>
  <button data-tab="resources">资源</button>
</nav>

<!-- Chat -->
<main id="chat" class="active">
  <div class="quick-actions">
    <button onclick="quickSend('查看所有云账户')">查看账户</button>
    <button onclick="quickSend('列出所有资源')">查看资源</button>
    <button onclick="quickSend('创建一个新的虚拟机')">新建VM</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg agent">你好，我是 MultiCloud AI Agent。可以帮你管理 Azure、腾讯云、Oracle Cloud 和 Render 等云平台资源。试试上面的快捷操作，或直接告诉我你想做什么。</div>
  </div>
  <div class="chat-input-bar">
    <input type="text" id="chatInput" placeholder="输入指令..." autocomplete="off">
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</main>

<!-- Accounts -->
<main id="accounts">
  <div class="section-title" id="accountCount">云账户 · 0</div>
  <div id="accountList"></div>
  <button class="cloud-option" style="width:100%; padding:12px; border:2px dashed var(--border); margin-top:8px; border-radius:var(--radius); background:none; color:var(--text-secondary); font-size:14px; cursor:pointer;" onclick="showAddForm()">+ 添加云账户</button>
  <div id="addForm" style="display:none; margin-top:12px;"></div>
</main>

<!-- Resources -->
<main id="resources">
  <div id="resourceList"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let currentTab = 'chat';
let sessionId = 'web-' + Date.now();

// Navigation
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('main').forEach(m => m.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById(currentTab).classList.add('active');
    if (currentTab === 'accounts') loadAccounts();
    if (currentTab === 'resources') loadResources();
  });
});

// Chat
document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

async function sendMessage(text) {
  const input = document.getElementById('chatInput');
  const msg = text || input.value.trim();
  if (!msg) return;
  if (!text) input.value = '';
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="chat-msg user">${e(msg)}</div><div class="chat-msg agent" id="loadingMsg" style="opacity:.5">思考中...</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('sendBtn').disabled = true;
  try {
    const res = await fetch(`${API}/agent/chat`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, session_id: sessionId})
    });
    const data = await res.json();
    document.getElementById('loadingMsg')?.remove();
    msgs.innerHTML += `<div class="chat-msg agent">${e(data.message || data.reply || '收到')}</div>`;
    if (data.session_id) sessionId = data.session_id;
  } catch {
    document.getElementById('loadingMsg')?.remove();
    msgs.innerHTML += `<div class="chat-msg agent">抱歉，连接失败。请确认后端已启动。</div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('sendBtn').disabled = false;
}
function quickSend(text) { sendMessage(text); }

// Accounts
async function loadAccounts() {
  const list = document.getElementById('accountList');
  try {
    const res = await fetch(`${API}/accounts/`);
    const data = await res.json();
    const accounts = data.accounts || [];
    document.getElementById('accountCount').textContent = `云账户 · ${accounts.length}`;
    if (accounts.length === 0) {
      list.innerHTML = '<div class="empty"><div class="icon">☁️</div>还没有添加云账户<br><span style="font-size:12px">点击下方按钮开始连接</span></div>';
      return;
    }
    const logos = {azure:'Az',tencent:'腾',oracle:'OC',render:'Re'};
    const cls = {azure:'icon-azure',tencent:'icon-tencent',oracle:'icon-oracle',render:'icon-render'};
    list.innerHTML = accounts.map(a => `
      <div class="account-card">
        <div class="icon ${cls[a.cloud_type]||'icon-azure'}">${logos[a.cloud_type]||'?'}</div>
        <div class="info">
          <div class="name">${e(a.name)}</div>
          <div class="meta">${a.cloud_type} · ${a.is_active?'已连接':'未激活'}</div>
        </div>
        <div class="actions">
          <button onclick="deleteAccount('${a.id}')">删除</button>
        </div>
      </div>
    `).join('');
  } catch { list.innerHTML = '<div class="empty">加载失败</div>'; }
}

// Cloud platform configs with instructions
const cloudConfigs = {
  azure: {
    name: 'Azure',
    desc: '通过 Azure 服务主体连接',
    guide: '前往 <a href="https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps/ApplicationsListBlade" target="_blank">Azure Portal > 应用注册</a>，创建应用并生成客户端密钥。需要订阅 ID、租户 ID、客户端 ID 和客户端密钥。',
    fields: [
      {key:'subscription_id', label:'订阅 ID', hint:'在 Azure Portal 首页即可找到'},
      {key:'tenant_id', label:'租户 ID', hint:'应用注册 > 概述 > 目录(租户) ID'},
      {key:'client_id', label:'客户端 ID', hint:'应用注册 > 概述 > 应用程序(客户端) ID'},
      {key:'client_secret', label:'客户端密钥', hint:'应用注册 > 证书和密码 > 新建客户端密码', password:true}
    ]
  },
  tencent: {
    name: '腾讯云',
    desc: '通过 SecretId/SecretKey 连接',
    guide: '前往 <a href="https://console.cloud.tencent.com/cam/capi" target="_blank">腾讯云控制台 > API密钥管理</a>，新建密钥后获取 SecretId 和 SecretKey。',
    fields: [
      {key:'secret_id', label:'SecretId', hint:'API 密钥管理页面可复制，前缀为 AKID'},
      {key:'secret_key', label:'SecretKey', hint:'创建密钥时仅显示一次，请妥善保存', password:true}
    ]
  },
  oracle: {
    name: 'Oracle Cloud',
    desc: '通过 OCI API 签名密钥连接',
    guide: '前往 <a href="https://cloud.oracle.com/identity/domains/my-profile" target="_blank">OCI 控制台 > 用户设置 > API密钥</a>，生成 API 签名密钥对。需要用户 OCID、租户 OCID、指纹和私钥。',
    fields: [
      {key:'user_ocid', label:'用户 OCID', hint:'用户详情页可找到'},
      {key:'tenancy_ocid', label:'租户 OCID', hint:'租户详情页可找到'},
      {key:'fingerprint', label:'指纹', hint:'添加 API 密钥后生成'},
      {key:'region', label:'区域', hint:'如 ap-tokyo-1、us-ashburn-1'},
      {key:'private_key', label:'私钥', hint:'生成密钥时下载的 .pem 文件内容', password:true}
    ]
  },
  render: {
    name: 'Render',
    desc: '通过 API Key 连接',
    guide: '前往 <a href="https://dashboard.render.com/u/settings/api-keys" target="_blank">Render Dashboard > Account Settings > API Keys</a>，创建新的 API Key。',
    fields: [
      {key:'api_key', label:'API Key', hint:'创建后仅显示一次，格式为 rnd_xxx', password:true}
    ]
  }
};

let selectedCloud = null;

function showAddForm() {
  const formDiv = document.getElementById('addForm');
  formDiv.innerHTML = '';
  selectedCloud = null;

  let optionsHTML = '<div class="section-title">选择云平台</div><div class="cloud-selector">';
  for (const [key, cfg] of Object.entries(cloudConfigs)) {
    optionsHTML += `<div class="cloud-option" data-cloud="${key}" onclick="selectCloud('${key}')">
      <div class="logo">☁️</div>
      <div class="label">${cfg.name}</div>
    </div>`;
  }
  optionsHTML += '</div>';
  formDiv.innerHTML = optionsHTML;
  formDiv.style.display = 'block';
  formDiv.scrollIntoView({behavior:'smooth'});
}

function selectCloud(cloud) {
  selectedCloud = cloud;
  document.querySelectorAll('.cloud-option').forEach(o => o.classList.remove('selected'));
  document.querySelector(`.cloud-option[data-cloud="${cloud}"]`).classList.add('selected');
  renderForm();
}

function renderForm() {
  const cfg = cloudConfigs[selectedCloud];
  const formDiv = document.getElementById('addForm');
  let html = `<div class="section-title" style="margin-top:12px">${cfg.name} · ${cfg.desc}</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5">${cfg.guide}</div>`;

  html += '<div class="form-group"><label>账户名称 <span class="required">*</span></label><input type="text" id="f_acctName" placeholder="如：生产环境 Azure"></div>';

  for (const f of cfg.fields) {
    html += `<div class="form-group">
      <label>${f.label} <span class="required">*</span></label>
      <input type="${f.password?'password':'text'}" id="f_${f.key}" placeholder="${f.label}">
      <div class="hint">${f.hint}</div>
    </div>`;
  }

  html += `<div class="form-actions">
    <button class="cancel" onclick="document.getElementById('addForm').style.display='none'">取消</button>
    <button class="submit" onclick="addAccount()">连接 ${cfg.name}</button>
  </div>`;

  formDiv.innerHTML = html;
}

async function addAccount() {
  if (!selectedCloud) return toast('请先选择云平台');
  const cfg = cloudConfigs[selectedCloud];
  const name = document.getElementById('f_acctName').value.trim();
  if (!name) return toast('请输入账户名称');

  const fields = {};
  for (const f of cfg.fields) {
    const val = document.getElementById(`f_${f.key}`).value.trim();
    if (!val) return toast(`请填写 ${f.label}`);
    fields[f.key] = val;
  }

  // Build credentials object
  const credentials = JSON.stringify({...fields, cloud: selectedCloud});

  try {
    const res = await fetch(`${API}/accounts/`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, cloud_type: selectedCloud, credentials})
    });
    if (res.ok) {
      toast(`${cfg.name} 连接成功`);
      document.getElementById('addForm').style.display = 'none';
      loadAccounts();
    } else {
      const err = await res.json();
      toast(err.error || '连接失败');
    }
  } catch { toast('请求失败'); }
}

async function deleteAccount(id) {
  if (!confirm('确认删除此账户？')) return;
  try {
    await fetch(`${API}/accounts/${id}`, {method:'DELETE'});
    toast('已删除');
    loadAccounts();
  } catch { toast('删除失败'); }
}

// Resources
async function loadResources() {
  const list = document.getElementById('resourceList');
  try {
    const res = await fetch(`${API}/resources/`);
    const data = await res.json();
    const resources = data.resources || [];
    if (resources.length === 0) {
      list.innerHTML = '<div class="empty"><div class="icon">🖥️</div>暂无资源<br><span style="font-size:12px">添加云账户后将自动同步资源</span></div>';
      return;
    }
    list.innerHTML = resources.map(r => `
      <div class="resource-card">
        <div class="info">
          <div class="name">${e(r.name)}</div>
          <div class="type">${e(r.type||'')} · ${e(r.region||'')} · ${e(r.cloud_type||'')}</div>
        </div>
        <div class="resource-actions">
          <span class="status-dot ${r.status==='running'?'status-running':'status-stopped'}"></span>${r.status||'unknown'}
          ${r.status==='running'
            ?`<button onclick="ctrlRes('${r.id}','stop')">停止</button>`
            :`<button onclick="ctrlRes('${r.id}','start')">启动</button>`}
        </div>
      </div>
    `).join('');
  } catch { list.innerHTML = '<div class="empty">加载失败</div>'; }
}

async function ctrlRes(id, action) {
  try {
    const res = await fetch(`${API}/resources/${id}/${action}`, {method:'POST'});
    if (res.ok) { toast(`${action==='start'?'启动':'停止'}指令已发送`); setTimeout(loadResources, 1500); }
  } catch { toast('操作失败'); }
}

// Health
async function checkHealth() {
  try {
    const res = await fetch('/api/health');
    document.getElementById('statusDot').style.background = res.ok ? 'var(--success)' : 'var(--danger)';
  } catch { document.getElementById('statusDot').style.background = 'var(--danger)'; }
}
setInterval(checkHealth, 15000); checkHealth();

// Utils
function e(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
</script>
</body>
</html>
