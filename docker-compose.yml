services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudops}
      POSTGRES_USER: ${POSTGRES_USER:-cloudops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudops123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudops}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
      - "3004:3004"
      - "3005:3005"
    environment:
      # ============ 数据库与缓存 ============
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudops}:${POSTGRES_PASSWORD:-cloudops123}@postgres:5432/${POSTGRES_DB:-cloudops}
      REDIS_URL: redis://redis:6379

      # ============ JWT ============
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      # ============ 初始管理员 ============
      # 留空时，首次启动会随机生成密码并打印在容器日志中
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # ============ 云服务商凭据（可选） ============
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:-}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      RENDER_API_KEY: ${RENDER_API_KEY:-}

      # ============ LLM（可选） ============
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}

      # ============ 内部服务地址 ============
      CLOUD_SERVICE_URL: ${CLOUD_SERVICE_URL:-http://localhost:3001}
      MONITOR_SERVICE_URL: ${MONITOR_SERVICE_URL:-http://localhost:3002}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://localhost:3004}

      # ============ Agent 配置（可选） ============
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-10}
      AGENT_TIMEOUT_MS: ${AGENT_TIMEOUT_MS:-120000}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
