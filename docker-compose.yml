version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: multicloud-pg
    environment:
      POSTGRES_USER: multicloud
      POSTGRES_PASSWORD: multicloud_dev
      POSTGRES_DB: multicloud
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multicloud -d multicloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: multicloud-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data: