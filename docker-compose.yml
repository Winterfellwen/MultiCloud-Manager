version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multicloud
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      - ENVIRONMENT=production
      - PORT=8099
      - DATABASE_URL=postgres://multicloud:multicloud@db:5432/multicloud?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SKILLS_DIR=/app/skills
    volumes:
      - app-data:/app/data
      - ./skills:/app/skills:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - multicloud-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    container_name: multicloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=multicloud
      - POSTGRES_PASSWORD=multicloud
      - POSTGRES_DB=multicloud
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./internal/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - multicloud-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multicloud -d multicloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: multicloud-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - multicloud-net
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  app-data:
  postgres-data:
  redis-data:

networks:
  multicloud-net:
    driver: bridge
