services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: multicloud
      POSTGRES_PASSWORD: multicloud_dev
      POSTGRES_DB: multicloud
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multicloud -d multicloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    environment:
      PORT: "8099"
      GIN_MODE: release
      ENVIRONMENT: development
      JWT_SECRET: dev-secret-change-in-production
      ADMIN_PASSWORD: test123
      DATABASE_URL: postgres://multicloud:multicloud_dev@postgres:5432/multicloud?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8099:8099"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
