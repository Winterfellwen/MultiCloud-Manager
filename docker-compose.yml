services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: multicloud
      POSTGRES_PASSWORD: multicloud_dev
      POSTGRES_DB: multicloud
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multicloud -d multicloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure

  backend:
    image: multicloud-manager-backend:latest
    environment:
      PORT: "8099"
      GIN_MODE: release
      ENVIRONMENT: development
      JWT_SECRET: dev-secret-change-in-production
      ADMIN_PASSWORD: test123
      DATABASE_URL: postgres://multicloud:multicloud_dev@postgres:5432/multicloud?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - target: 8099
        published: 8099
        protocol: tcp
        mode: host
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  pg_data:
