services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multicloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multicloud_dev}
      POSTGRES_DB: ${POSTGRES_DB:-multicloud}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multicloud} -d ${POSTGRES_DB:-multicloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  backend:
    build: .
    environment:
      PORT: "8099"
      GIN_MODE: release
      ENVIRONMENT: development
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER:-multicloud}:${POSTGRES_PASSWORD:-multicloud_dev}@postgres:5432/${POSTGRES_DB:-multicloud}?sslmode=disable
      REDIS_URL: redis://default:${REDIS_PASSWORD:-changeme}@redis:6379/0
      TERMINAL_ENABLED: ${TERMINAL_ENABLED:-false}
    ports:
      - "8099:8099"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  pg_data:
