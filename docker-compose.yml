services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multicloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multicloud_dev}
      POSTGRES_DB: ${POSTGRES_DB:-multicloud}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multicloud} -d ${POSTGRES_DB:-multicloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    environment:
      PORT: "8099"
      GIN_MODE: release
      ENVIRONMENT: development
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER:-multicloud}:${POSTGRES_PASSWORD:-multicloud_dev}@postgres:5432/${POSTGRES_DB:-multicloud}?sslmode=disable
      REDIS_URL: redis://default:${REDIS_PASSWORD:-changeme}@redis:6379/0
    ports:
      - "8099:8099"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
