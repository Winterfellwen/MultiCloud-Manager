version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: 3004
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      CLOUD_SERVICE_URL: ${CLOUD_SERVICE_URL}
      MONITOR_SERVICE_URL: ${MONITOR_SERVICE_URL}
      AI_AGENT_URL: ${AI_AGENT_URL}
      PORT: 3000
    depends_on:
      - auth-service

  cloud-service:
    build:
      context: .
      dockerfile: cloud-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PORT: 3001
      # Cloud Provider credentials
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ROLE_ARN: ${AWS_ROLE_ARN:-}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:-}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:-}
      ALIYUN_REGION: ${ALIYUN_REGION:-cn-hangzhou}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  monitor-service:
    build:
      context: .
      dockerfile: monitor-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PORT: 3002
      CLOUD_SERVICE_URL: http://cloud-service:3001
      METRIC_COLLECT_INTERVAL: 300
      ALERT_CHECK_INTERVAL: 60
      COST_COLLECT_INTERVAL: 86400
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-cloudops@noreply.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cloud-service:
        condition: service_started

  ai-agent:
    build:
      context: .
      dockerfile: ai-agent/Dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET}
      CLOUD_SERVICE_URL: http://cloud-service:3001
      MONITOR_SERVICE_URL: http://monitor-service:3002
      AUTH_SERVICE_URL: http://auth-service:3004
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-10}
      AGENT_TIMEOUT_MS: ${AGENT_TIMEOUT_MS:-120000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cloud-service:
        condition: service_started
      monitor-service:
        condition: service_started

  ai-gateway:
    build:
      context: .
      dockerfile: ai-gateway/Dockerfile
    ports:
      - "3005:3005"
    environment:
      AI_GATEWAY_PORT: "3005"
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # LLM 默认 provider（向后兼容）
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      # 多 provider 配置（JSON 数组，可选）
      LLM_PROVIDERS: ${LLM_PROVIDERS:-}
      # MCP 服务器配置（JSON 对象，可选）
      MCP_SERVERS: ${MCP_SERVERS:-}
      CLOUD_SERVICE_URL: http://cloud-service:3001
      MONITOR_SERVICE_URL: http://monitor-service:3002
      ACP_MAX_CONCURRENT_SESSIONS: "10"
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-10}
      AGENT_TIMEOUT_MS: ${AGENT_TIMEOUT_MS:-120000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ai-gateway-data:/app/ai-gateway/data
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-console:
    build:
      context: .
      dockerfile: web-console/Dockerfile
    ports:
      - "3006:80"
    depends_on:
      - api-gateway
      - ai-gateway
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ai-gateway-data: