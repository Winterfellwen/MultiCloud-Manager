server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 使用相对重定向（保留端口，避免 301 到 http://localhost/xxx/ 丢失端口）
    absolute_redirect off;

    # SPA 路由回退（不使用 $uri/ 避免目录重定向与 API 代理冲突）
    location / {
        try_files $uri /index.html;
    }

    # SPA 页面路由（显式匹配，避免被 API 代理拦截）
    location = /monitor { try_files /index.html /index.html; }
    location = /users { try_files /index.html /index.html; }
    location = /audit { try_files /index.html /index.html; }
    location = /costs { try_files /index.html /index.html; }
    location = /tools { try_files /index.html /index.html; }
    location = /mcp { try_files /index.html /index.html; }
    location = /dashboard { try_files /index.html /index.html; }
    location = /instances { try_files /index.html /index.html; }
    location = /cloud-accounts { try_files /index.html /index.html; }
    location = /ai-settings { try_files /index.html /index.html; }
    location = /chat/react { try_files /index.html /index.html; }
    location = /chat/lit { try_files /index.html /index.html; }

    # API 代理到 api-gateway（带子路径时才代理）
    location /auth/ { proxy_pass http://api-gateway:3000; }
    location /users/ { proxy_pass http://api-gateway:3000; }
    location /audit/ { proxy_pass http://api-gateway:3000; }
    location /cloud/ { proxy_pass http://api-gateway:3000; }
    location /monitor/ { proxy_pass http://api-gateway:3000; }
    location /agent/ { proxy_pass http://api-gateway:3000; }

    # WebSocket 代理到 ai-gateway
    location /ws {
        proxy_pass http://ai-gateway:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
