<h2>流式输出光标（打字光标）</h2>
<p class="subtitle>AI 正在逐字生成内容时，文本末尾的"光标"效果。</p>

<style>
  .preview-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
  .preview { padding: 14px; border: 1px solid var(--border); border-radius: 8px; min-height: 160px; cursor: pointer; transition: border-color 0.15s; }
  .preview:hover { border-color: var(--primary); }
  .preview.selected { border-color: var(--primary); background: rgba(37, 99, 235, 0.05); }
  .preview h3 { margin: 0 0 4px; font-size: 14px; }
  .preview .meta { color: var(--muted-foreground); font-size: 11px; margin-bottom: 14px; }
  .text { background: #f3f4f6; color: #111; padding: 10px 14px; border-radius: 12px; display: inline-block; font-size: 13px; line-height: 1.5; }
  .caret { display: inline-block; width: 6px; height: 14px; background: #111; vertical-align: text-bottom; margin-left: 1px; }
  /* A: 不透明度脉冲 */
  .a .caret { animation: a-blink 1s steps(2) infinite; }
  @keyframes a-blink { 50% { opacity: 0; } }
  /* B: 不透明度平滑淡入淡出 */
  .b .caret { animation: b-blink 1.1s ease-in-out infinite; }
  @keyframes b-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  /* C: 宽度变化（模拟字符占位） */
  .c .caret { animation: c-blink 1s steps(1) infinite; }
  @keyframes c-blink { 0% { width: 6px; } 50% { width: 0; } 100% { width: 6px; } }
</style>

<div class="preview-row">
  <div class="preview a option" data-choice="a" onclick="toggleSelect(this)">
    <h3>A. 硬切脉冲 ⭐</h3>
    <p class="meta">1s · steps(2) · 像终端</p>
    <div class="text">正在分析资源使用情况<span class="caret"></span></div>
  </div>
  <div class="preview b option" data-choice="b" onclick="toggleSelect(this)">
    <h3>B. 平滑淡入淡出</h3>
    <p class="meta">1.1s · ease-in-out · 更柔和</p>
    <div class="text">正在分析资源使用情况<span class="caret"></span></div>
  </div>
  <div class="preview c option" data-choice="c" onclick="toggleSelect(this)">
    <h3>C. 宽度变化</h3>
    <p class="meta">1s · 模拟字符占位 · 不太常见</p>
    <div class="text">正在分析资源使用情况<span class="caret"></span></div>
  </div>
</div>
